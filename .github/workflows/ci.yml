name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @tidypress/config
        run: pnpm --filter @tidypress/config build

      - name: Typecheck CLI
        run: pnpm --filter tidypress typecheck

      - name: Run tests
        run: pnpm -r test

      - name: Build workspace
        run: pnpm -r --workspace-concurrency=1 build

  install-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @tidypress/config
        run: pnpm --filter @tidypress/config build

      - name: Real install e2e (npm pack → clean install → init → build)
        run: pnpm --filter tidypress test:install-e2e
        timeout-minutes: 40

      - name: Registry e2e (npm, pnpm, pip from public registries)
        run: pnpm --filter tidypress test:registry-e2e
        timeout-minutes: 60

      - name: Build moat examples
        run: |
          pnpm --filter @tidypress/example-lab build
          pnpm --filter @tidypress/example-blog build
          pnpm --filter @tidypress/example-persona build

      - name: Generate marketing site context snapshot
        run: pnpm --filter @tidypress/site context

      - name: Verify site context snapshot is committed
        run: git diff --exit-code apps/site/tidypress-context.md

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test Python package
        run: |
          python -m pip install -e "./wrappers/python[dev]"
          pytest wrappers/python/tests -q
        timeout-minutes: 30

      - name: Enforce minimum test count
        run: node ./.github/scripts/assert-test-count.mjs

      - name: Build Python package
        working-directory: wrappers/python
        run: |
          python -m pip install --upgrade build
          python -m build

  deploy-site:
    name: Deploy docs site to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate]
    environment: prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache tidypress build inputs
        uses: actions/cache@v4
        with:
          path: ~/.cache/tidypress
          key: tidypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/engine/**', 'apps/site/**') }}
          restore-keys: |
            tidypress-${{ runner.os }}-

      - name: Clean previous build artifacts
        run: |
          rm -rf apps/site/build
          rm -rf packages/engine/dist

      - name: Build config package
        run: pnpm --filter @tidypress/config build

      - name: Build CLI
        run: pnpm --filter tidypress build

      - name: Build site
        run: pnpm --filter @tidypress/site build

      # wrangler is a root devDependency; pnpm exec avoids wrangler-action trying
      # to pnpm-add wrangler into the private workspace during the job.
      - name: Ensure Cloudflare Pages project exists
        continue-on-error: true
        run: pnpm exec wrangler pages project create tidypress --production-branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Publish to Cloudflare Pages
        run: pnpm exec wrangler pages deploy apps/site/build --project-name=tidypress --branch=main --commit-hash=${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
