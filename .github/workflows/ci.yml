name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm -r test

      - name: Build workspace
        run: pnpm -r build

  install-e2e:
    name: Real install e2e (npm pack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @docsmint/config
        run: pnpm --filter @docsmint/config build

      - name: Real install e2e (npm pack → clean install → init → build)
        run: pnpm --filter docsmint test:install-e2e
        timeout-minutes: 40

      - name: Build moat examples
        run: |
          pnpm --filter @docsmint/example-lab build
          pnpm --filter @docsmint/example-blog build
          pnpm --filter @docsmint/example-persona build

      - name: Generate marketing site context snapshot
        run: pnpm --filter @docsmint/site context

      - name: Verify site context snapshot is committed
        run: git diff --exit-code apps/site/docsmint-context.md

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test Python package
        run: |
          python -m pip install -e "./wrappers/python[dev]"
          pytest wrappers/python/tests -q
        timeout-minutes: 30

      - name: Enforce minimum test count
        run: node ./.github/scripts/assert-test-count.mjs

      - name: Build Python package
        working-directory: wrappers/python
        run: |
          python -m pip install --upgrade build
          python -m build

  deploy-site:
    name: Deploy docs site to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, install-e2e]
    environment: prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache docsmint build inputs
        uses: actions/cache@v4
        with:
          path: ~/.cache/docsmint
          key: docsmint-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/engine/**', 'apps/site/**') }}
          restore-keys: |
            docsmint-${{ runner.os }}-

      - name: Clean previous build artifacts
        run: |
          rm -rf apps/site/build
          rm -rf packages/engine/dist

      - name: Build config package
        run: pnpm --filter @docsmint/config build

      - name: Build site
        run: pnpm --filter @docsmint/site build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: usedocsmint
          directory: apps/site/build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
