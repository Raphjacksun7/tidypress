name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  # ── Changesets: open/update the "Version Packages" PR on every push to main ──
  changesets-release:
    name: Changesets release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Validate: run on every tag push (manual release path) ───────────────────
  validate-release:
    name: Validate release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require green CI on tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for check in validate install-e2e; do
            conclusion=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs" \
              --paginate -q ".check_runs[] | select(.name==\"${check}\") | .conclusion" | head -1)
            if [ "${conclusion:-}" != "success" ]; then
              echo "Required check \"${check}\" is not success (got: ${conclusion:-missing})." >&2
              echo "Merge to main and wait for CI before pushing a release tag." >&2
              exit 1
            fi
          done

      - name: Build @tidypress/config
        run: pnpm --filter @tidypress/config build

      - name: Build CLI (release alignment imports dist)
        run: pnpm --filter tidypress build

      - name: Verify tag matches all package versions
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs/promises'
          import { assertReleaseVersionAlignment, readPythonProjectVersion } from './packages/cli/dist/application/release/version-alignment.js'

          const [cliRaw, configRaw, engineRaw, pyprojectRaw] = await Promise.all([
            fs.readFile('./packages/cli/package.json', 'utf8'),
            fs.readFile('./packages/config/package.json', 'utf8'),
            fs.readFile('./packages/engine/package.json', 'utf8'),
            fs.readFile('./wrappers/python/pyproject.toml', 'utf8'),
          ])

          const result = assertReleaseVersionAlignment({
            tagName: process.env.TAG_NAME,
            cliVersion: JSON.parse(cliRaw).version,
            configVersion: JSON.parse(configRaw).version,
            engineVersion: JSON.parse(engineRaw).version,
            pythonVersion: readPythonProjectVersion(pyprojectRaw),
          })

          console.log(`Release version alignment OK for ${result.releaseVersion}`)
          EOF

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package
        working-directory: wrappers/python
        run: |
          python -m pip install --upgrade build
          python -m build

  # ── npm (OIDC trusted publishing — no NPM_TOKEN) ───────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @tidypress/config
        run: pnpm --filter @tidypress/config build

      - name: Build CLI
        run: pnpm --filter tidypress build

      - name: Publish tidypress (OIDC trusted publishing)
        working-directory: packages/cli
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          PKG_VERSION="${VERSION#v}"
          if npm view "tidypress@${PKG_VERSION}" version &>/dev/null; then
            echo "tidypress@${PKG_VERSION} already published — skipping."
          else
            pnpm publish --access public --no-git-checks --provenance
          fi

      - name: Smoke test — install published package and run CLI
        env:
          CLI_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${CLI_VERSION#v}"
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"

          # npm registry propagation can lag behind a successful publish.
          echo "Waiting for tidypress@${VERSION} on npm registry..."
          for attempt in $(seq 1 24); do
            if npm view "tidypress@${VERSION}" version &>/dev/null; then
              break
            fi
            if [ "$attempt" -eq 24 ]; then
              echo "tidypress@${VERSION} not visible on npm after 120s" >&2
              exit 1
            fi
            echo "Attempt ${attempt}/24 — retrying in 5s..."
            sleep 5
          done

          npm install "tidypress@${VERSION}"
          node ./node_modules/tidypress/bin/tidypress.js --version
          echo "smoke test OK: tidypress@${VERSION}"

  # ── PyPI (OIDC trusted publishing — no PyPI API token) ───────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package
        working-directory: wrappers/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wrappers/python/dist/
          skip_existing: true
