name: Publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  # ── Changesets: open/update the "Version Packages" PR on every push to main ──
  changesets-release:
    name: Changesets release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Validate: run on every tag push (manual release path) ───────────────────
  validate-release:
    name: Validate release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches all package versions
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs/promises'
          import { assertReleaseVersionAlignment, readPythonProjectVersion } from './packages/cli/src/utils/release.js'

          const [cliRaw, configRaw, engineRaw, pyprojectRaw] = await Promise.all([
            fs.readFile('./packages/cli/package.json', 'utf8'),
            fs.readFile('./packages/config/package.json', 'utf8'),
            fs.readFile('./packages/engine/package.json', 'utf8'),
            fs.readFile('./wrappers/python/pyproject.toml', 'utf8'),
          ])

          const result = assertReleaseVersionAlignment({
            tagName: process.env.TAG_NAME,
            cliVersion: JSON.parse(cliRaw).version,
            configVersion: JSON.parse(configRaw).version,
            engineVersion: JSON.parse(engineRaw).version,
            pythonVersion: readPythonProjectVersion(pyprojectRaw),
          })

          console.log(`Release version alignment OK for ${result.releaseVersion}`)
          EOF

      - name: Clean previous build artifacts
        run: |
          rm -rf apps/site/build
          rm -rf packages/engine/dist

      - name: Run tests
        run: pnpm -r test

      - name: Build workspace
        run: pnpm -r --workspace-concurrency=1 build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package
        working-directory: wrappers/python
        run: |
          python -m pip install --upgrade build
          python -m build

  # ── npm ──────────────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm -r test

      - name: Build @tidypress/config
        run: pnpm --filter @tidypress/config build

      - name: Publish tidypress
        working-directory: packages/cli
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test — install published package and run CLI
        env:
          CLI_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${CLI_VERSION#v}"
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          npm install "tidypress@${VERSION}"
          node ./node_modules/tidypress/bin/tidypress.js --version
          echo "smoke test OK: tidypress@${VERSION}"

  # ── PyPI ─────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python package
        working-directory: wrappers/python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wrappers/python/dist/
