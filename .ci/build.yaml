# ── docsmint CI ──────────────────────────────────────────────────────────────────
#
# Push / PR to main:  lint
# Tag push:           lint → build → publish to Internal_Python (Azure Artifacts)

trigger:
  branches:
    include: ['*']
  tags:
    include: ['*']

pr:
  branches:
    include: [main]

pool: 'Azure Pipelines'

steps:

  # ── Toolchain ────────────────────────────────────────────────────────────────

  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.12'
    displayName: 'Use Python 3.12'

  - script: pip install uv twine ruff
    displayName: 'Install tools'

  # ── Lint ─────────────────────────────────────────────────────────────────────

  - script: ruff check python/
    displayName: 'Lint (ruff)'

  # ── Build + publish ───────────────────────────────────────────────────────────

  - script: |
      sed -i "s/^version = .*/version = \"$(Build.SourceBranchName)\"/" pyproject.toml
      uv build
    displayName: 'Build package'
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))

  - task: TwineAuthenticate@1
    inputs:
      artifactFeed: 'Internal_Python'
    displayName: 'Authenticate with Internal_Python feed'
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))

  - script: twine upload -r Internal_Python --config-file $(PYPIRC_PATH) dist/*.whl
    displayName: 'Publish to Internal_Python'
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/'))
