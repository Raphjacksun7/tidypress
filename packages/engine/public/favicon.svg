        d="M 100,86
          C 185,0 200,0 200,50
          C 200,85  145,100  102,100
          C 100,100  100,92  100,86 Z
        M 172,34 m-16,0a16,6.2 0 1,0 32,0a16,6.2 0 1,0-32,0Z
        M 150,64 m-12,0a12,4.5 0 1,0 24,0a12,4.5 0 1,0-24,0Z
        M 138,82 m-8,0a8,2.8 0 1,0 16,0a8,2.8 0 1,0-16,0Z
