        M 18,14m-1,0a1,.65 0 1,0 2,0a1,.65 0 1,0-2,0Z
        M 34,6m-1.2,0a1.2,.8 0 1,0 2.4,0a1.2,.8 0 1,0-2.4,0Z
        M 2,100m-.45,0a.45,.3 0 1,0 .9,0a.45,.3 0 1,0-.9,0Z
      " />
      <!-- right forewing (foreshortened) -->
