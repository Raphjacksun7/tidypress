<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill-rule="evenodd">
  <style>
    .ink { fill: #52525b; }
    .ink-line {
      fill: none;
      stroke: #52525b;
      stroke-width: 1.05;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .ring { fill: none; stroke: #52525b; stroke-width: 0.85; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #d4d4d8; }
      .ink-line, .ring { stroke: #d4d4d8; }
    }
  </style>

  <!--
    Monochrome: zinc-600 on light, zinc-300 on dark; clear = negative / paper.
    Monarch-like paper-cut: thick margin spots, veined cells, 3/4 “penché” left. No antennae.
  -->
  <g transform="rotate(-32 100 100)">
    <g class="ink">
      <!-- left forewing -->
      <path
        d="M 100,86
          C 15,0 0,0 0,50
          C 0,85 55,100  98,100
          C 100,100  100,92  100,86 Z
        M 8,32 m-20,0a20,7.5 0 1,0 40,0a20,7.5 0 1,0-40,0Z
        M 48,60 m-16,0a16,5.5 0 1,0 32,0a16,5.5 0 1,0-32,0Z
        M 64,80 m-10,0a10,3.2 0 1,0 20,0a10,3.2 0 1,0-20,0Z
        M 6,20m-.8,0a.8,.5 0 1,0 1.6,0a.8,.5 0 1,0-1.6,0Z
